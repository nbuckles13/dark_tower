apiVersion: v1
kind: ConfigMap
metadata:
  name: mc-service-config
  namespace: dark-tower
  labels:
    app: mc-service
    component: signaling
data:
  # gRPC server for GC communication
  MC_GRPC_BIND_ADDRESS: "0.0.0.0:50052"
  # Health endpoint
  MC_HEALTH_BIND_ADDRESS: "0.0.0.0:8081"
  # WebTransport server for client connections
  MC_WEBTRANSPORT_BIND_ADDRESS: "0.0.0.0:4433"
  # Deployment region (local for Kind)
  MC_REGION: "local"
  # GC service discovery via Kubernetes DNS
  GC_GRPC_URL: "http://gc-service.dark-tower:50051"
  # AC JWKS endpoint for JWT validation
  AC_JWKS_URL: "http://ac-service.dark-tower:8082/.well-known/jwks.json"
  # TLS certificate paths for WebTransport (mounted from mc-service-tls Secret)
  MC_TLS_CERT_PATH: "/etc/mc-tls/tls.crt"
  MC_TLS_KEY_PATH: "/etc/mc-tls/tls.key"
