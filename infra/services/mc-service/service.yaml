# ClusterIP Service — for internal gRPC and health access.
# WebTransport is NOT exposed here; clients use per-pod NodePort Services.
apiVersion: v1
kind: Service
metadata:
  name: mc-service
  namespace: dark-tower
  labels:
    app: mc-service
    component: signaling
spec:
  type: ClusterIP
  selector:
    app: mc-service
    component: signaling
  ports:
  - name: grpc
    protocol: TCP
    port: 50052
    targetPort: 50052
  - name: health
    protocol: TCP
    port: 8081
    targetPort: 8081
  sessionAffinity: None
---
# Per-instance NodePort Services for WebTransport (QUIC/UDP).
# Each MC instance (Deployment) gets its own host-reachable port via Kind port mapping.
# Changing instance count requires adding/removing these Services + Kind port mappings
# + per-instance Deployments and ConfigMaps.
#
# mc-0: hostPort 4433 → nodePort 30433 → pod mc-0 port 4433
apiVersion: v1
kind: Service
metadata:
  name: mc-service-0
  namespace: dark-tower
  labels:
    app: mc-service
    component: signaling
    instance: mc-0
spec:
  type: NodePort
  selector:
    app: mc-service
    component: signaling
    instance: mc-0
  ports:
  - name: webtransport
    protocol: UDP
    port: 4433
    targetPort: 4433
    nodePort: 30433
  sessionAffinity: None
---
# mc-1: hostPort 4435 → nodePort 30435 → pod mc-1 port 4433
apiVersion: v1
kind: Service
metadata:
  name: mc-service-1
  namespace: dark-tower
  labels:
    app: mc-service
    component: signaling
    instance: mc-1
spec:
  type: NodePort
  selector:
    app: mc-service
    component: signaling
    instance: mc-1
  ports:
  - name: webtransport
    protocol: UDP
    port: 4433
    targetPort: 4433
    nodePort: 30435
  sessionAffinity: None
