# WARNING: Do not apply this manifest directly — the empty placeholder values will
# cause the MC pod to fail with a "missing cert" error. Instead, generate certs first
# and create the Secret from them:
#
#   ./scripts/generate-dev-certs.sh
#   kubectl create secret tls mc-service-tls \
#     --cert=infra/docker/certs/mc-webtransport.crt \
#     --key=infra/docker/certs/mc-webtransport.key \
#     -n dark-tower --dry-run=client -o yaml | kubectl apply -f -
#
# In production, populate via external-secrets or cert-manager.
apiVersion: v1
kind: Secret
metadata:
  name: mc-service-tls
  namespace: dark-tower
  labels:
    app: mc-service
    component: signaling
type: kubernetes.io/tls
stringData:
  tls.crt: ""
  tls.key: ""
