apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - configmap.yaml
  - statefulset.yaml
  - service.yaml
  - pdb.yaml
  - network-policy.yaml
  # service-monitor.yaml NOT listed — requires Prometheus Operator CRD

labels:
  - pairs:
      managed-by: dark-tower
    includeSelectors: false
