apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mh-service
  namespace: dark-tower
  labels:
    app: mh-service
    component: media
spec:
  podSelector:
    matchLabels:
      app: mh-service
      component: media
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from Meeting Controller (gRPC media forwarding)
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: dark-tower
      podSelector:
        matchLabels:
          app: mc-service
    ports:
    - protocol: TCP
      port: 50053
  # Allow ingress from external clients (WebTransport media)
  # In Kind, exposed via NodePort 30434 (mapped to host 4434 in kind-config.yaml)
  - from: []
    ports:
    - protocol: UDP
      port: 4434
  # Allow ingress from Prometheus for metrics scraping
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: dark-tower-observability
      podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 8083
  egress:
  # Allow egress to Global Controller (registration, heartbeat)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: dark-tower
      podSelector:
        matchLabels:
          app: gc-service
    ports:
    - protocol: TCP
      port: 50051
  # Allow egress to Auth Controller (OAuth token acquisition)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: dark-tower
      podSelector:
        matchLabels:
          app: ac-service
    ports:
    - protocol: TCP
      port: 8082
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
