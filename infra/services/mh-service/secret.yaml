apiVersion: v1
kind: Secret
metadata:
  name: mh-service-secrets
  namespace: dark-tower
  labels:
    app: mh-service
    component: media
type: Opaque
stringData:
  # OAuth 2.0 client secret for MH authentication with AC (ADR-0010)
  # Matches the credential seeded in setup.sh: media-handler / media-handler-secret-dev-003
  # In production, override via external-secrets or sealed-secrets
  MH_CLIENT_SECRET: "media-handler-secret-dev-003"
