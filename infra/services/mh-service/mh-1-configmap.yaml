apiVersion: v1
kind: ConfigMap
metadata:
  name: mh-1-config
  namespace: dark-tower
  labels:
    app: mh-service
    component: media
    instance: mh-1
data:
  # Per-instance WebTransport advertise address (explicit, no computation needed).
  # This is the address GC tells clients to connect to for this specific MH pod.
  MH_WEBTRANSPORT_ADVERTISE_ADDRESS: "https://localhost:4436"
