# ClusterIP Service — for internal gRPC and health access.
# WebTransport is NOT exposed here; clients use per-pod NodePort Services.
apiVersion: v1
kind: Service
metadata:
  name: mh-service
  namespace: dark-tower
  labels:
    app: mh-service
    component: media
spec:
  type: ClusterIP
  selector:
    app: mh-service
    component: media
  ports:
  - name: health
    protocol: TCP
    port: 8083
    targetPort: 8083
  - name: grpc
    protocol: TCP
    port: 50053
    targetPort: 50053
  sessionAffinity: None
---
# Per-instance NodePort Services for WebTransport (QUIC/UDP).
# Each MH instance (Deployment) gets its own host-reachable port via Kind port mapping.
# Changing instance count requires adding/removing these Services + Kind port mappings
# + per-instance Deployments and ConfigMaps.
#
# mh-0: hostPort 4434 → nodePort 30434 → pod mh-0 port 4434
apiVersion: v1
kind: Service
metadata:
  name: mh-service-0
  namespace: dark-tower
  labels:
    app: mh-service
    component: media
    instance: mh-0
spec:
  type: NodePort
  selector:
    app: mh-service
    component: media
    instance: mh-0
  ports:
  - name: webtransport
    protocol: UDP
    port: 4434
    targetPort: 4434
    nodePort: 30434
  sessionAffinity: None
---
# mh-1: hostPort 4436 → nodePort 30436 → pod mh-1 port 4434
apiVersion: v1
kind: Service
metadata:
  name: mh-service-1
  namespace: dark-tower
  labels:
    app: mh-service
    component: media
    instance: mh-1
spec:
  type: NodePort
  selector:
    app: mh-service
    component: media
    instance: mh-1
  ports:
  - name: webtransport
    protocol: UDP
    port: 4434
    targetPort: 4434
    nodePort: 30436
  sessionAffinity: None
