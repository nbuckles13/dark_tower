# kind cluster configuration for Dark Tower local development
# This configuration creates a single-node cluster with Calico CNI for NetworkPolicy enforcement
#
# Usage: kind create cluster --config=infra/kind/kind-config.yaml --name=dark-tower
#
# See ADR-0013 for the single-tier development environment strategy.

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: dark-tower

nodes:
  - role: control-plane
    # Expose ports for local access
    extraPortMappings:
      # Prometheus
      - containerPort: 30090
        hostPort: 9090
        protocol: TCP
      # Grafana
      - containerPort: 30030
        hostPort: 3000
        protocol: TCP
      # Loki
      - containerPort: 30080
        hostPort: 3100
        protocol: TCP
      # MC/MH WebTransport (QUIC/UDP) — per-instance NodePorts.
      # Each MC/MH instance has its own Deployment + NodePort Service.
      # Changing instance count requires updating these mappings + per-instance manifests.
      # Note: Kind UDP support is best-effort; use port-forward as fallback
      #
      # MC-0: hostPort 4433 → nodePort 30433
      - containerPort: 30433
        hostPort: 4433
        protocol: UDP
      # MC-1: hostPort 4435 → nodePort 30435
      - containerPort: 30435
        hostPort: 4435
        protocol: UDP
      # MH-0: hostPort 4434 → nodePort 30434
      - containerPort: 30434
        hostPort: 4434
        protocol: UDP
      # MH-1: hostPort 4436 → nodePort 30436
      - containerPort: 30436
        hostPort: 4436
        protocol: UDP

# Use containerd as the container runtime
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."localhost:5001"]
      endpoint = ["http://kind-registry:5000"]

# Networking configuration for Calico
networking:
  # Pod subnet - must match Calico's default
  podSubnet: "192.168.0.0/16"
  # Service subnet
  serviceSubnet: "10.96.0.0/16"
  # IMPORTANT: Disable default CNI so Calico can be installed
  # This enables NetworkPolicy enforcement in both dev and CI
  disableDefaultCNI: true
