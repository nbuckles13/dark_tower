# NodePort service for GC in Kind clusters.
# Exposes GC HTTP on nodePort 30180 and gRPC on nodePort 30051,
# matching kind-config.yaml.tmpl containerPorts.
# hostPort (from kind-config) -> nodePort -> GC pod
apiVersion: v1
kind: Service
metadata:
  name: gc-service-nodeport
  namespace: dark-tower
  labels:
    app: gc-service
    component: gateway
spec:
  type: NodePort
  selector:
    app: gc-service
    component: gateway
  ports:
  - name: http
    protocol: TCP
    port: 8080
    targetPort: 8080
    nodePort: 30180
  - name: grpc
    protocol: TCP
    port: 50051
    targetPort: 50051
    nodePort: 30051
  sessionAffinity: None
