# NodePort service for AC in Kind clusters.
# Exposes AC HTTP on nodePort 30082, matching kind-config.yaml.tmpl containerPort.
# hostPort (from kind-config) -> nodePort 30082 -> AC pod port 8082
apiVersion: v1
kind: Service
metadata:
  name: ac-service-nodeport
  namespace: dark-tower
  labels:
    app: ac-service
    component: auth
spec:
  type: NodePort
  selector:
    app: ac-service
    component: auth
  ports:
  - name: http
    protocol: TCP
    port: 8082
    targetPort: 8082
    nodePort: 30082
  sessionAffinity: None
