# Prometheus alerting rules for Meeting Controller
#
# Severity levels (per docs/observability/alert-conventions.md):
# - page: User-visible impact now or SLO burn; pages oncall immediately (PagerDuty)
# - warning: Degraded but contained, or approaching limits; Slack notify, business hours
# - info: Awareness/trend/leading indicator; no notification, dashboards only
#
# All alerts link to sections in the consolidated incident response runbook:
# docs/runbooks/mc-incident-response.md

groups:
  - name: mc-service-page
    interval: 30s
    rules:
      # ====================================================================
      # PAGE ALERTS - User-visible impact or SLO burn; page oncall immediately
      # ====================================================================

      - alert: MCDown
        expr: |
          up{job="mc-service"} == 0
        for: 1m
        labels:
          severity: page
          service: mc-service
          component: infrastructure
        annotations:
          summary: "Meeting Controller service is down"
          description: "Meeting Controller has no running pods for 1 minute. All active meetings are affected."
          impact: "Users in active meetings may be disconnected. New meeting joins will fail."
          runbook_url: "docs/runbooks/mc-incident-response.md#scenario-4-complete-service-outage"

      - alert: MCActorPanic
        expr: |
          increase(mc_actor_panics_total[5m]) > 0
        for: 0m
        labels:
          severity: page
          service: mc-service
          component: actor-system
        annotations:
          summary: "MC actor panic detected ({{ $labels.actor_type }})"
          description: "Actor {{ $labels.actor_type }} has panicked. Per ADR-0023, MeetingControllerActor panic is fatal (shutdown) and MeetingActor panic triggers meeting migration - both user-visible."
          impact: "Affected meetings disrupted (migration for MeetingActor, full shutdown for root controller). Root cause investigation required."
          runbook_url: "docs/runbooks/mc-incident-response.md#scenario-2-actor-panics"

      - alert: MCHighMailboxDepthCritical
        expr: |
          sum by(actor_type) (mc_actor_mailbox_depth) > 500
        for: 2m
        labels:
          severity: page
          service: mc-service
          component: actor-system
        annotations:
          summary: "MC mailbox depth critical ({{ $labels.actor_type }}: {{ $value }})"
          description: "Actor {{ $labels.actor_type }} has mailbox depth {{ $value }} (>500) for 2 minutes. Severe backpressure - messages will be dropped."
          impact: "Message processing severely delayed. Active meetings experiencing significant lag or failures."
          runbook_url: "docs/runbooks/mc-incident-response.md#scenario-1-high-mailbox-depth"

  - name: mc-service-warning
    interval: 60s
    rules:
      # ====================================================================
      # WARNING ALERTS - Notify but don't page
      # ====================================================================

      - alert: MCHighMailboxDepthWarning
        expr: |
          sum by(actor_type) (mc_actor_mailbox_depth) > 100
        for: 5m
        labels:
          severity: warning
          service: mc-service
          component: actor-system
        annotations:
          summary: "MC mailbox depth elevated ({{ $labels.actor_type }}: {{ $value }})"
          description: "Actor {{ $labels.actor_type }} has mailbox depth {{ $value }} (>100) for 5 minutes. Investigate backpressure cause."
          impact: "Message processing delayed. May escalate if not addressed."
          runbook_url: "docs/runbooks/mc-incident-response.md#scenario-1-high-mailbox-depth"

      - alert: MCGCHeartbeatFailure
        expr: |
          (
            sum(rate(mc_gc_heartbeats_total{status="error"}[5m]))
            /
            sum(rate(mc_gc_heartbeats_total[5m]))
          ) > 0.5
        for: 2m
        labels:
          severity: warning
          service: mc-service
          component: gc-integration
        annotations:
          summary: "MC-GC heartbeat failures ({{ $value | humanizePercentage }} error rate)"
          description: "Meeting Controller failing to send heartbeats to Global Controller. Error rate {{ $value | humanizePercentage }} for 2 minutes. Existing sessions continue; new meeting assignments will not route to this MC."
          impact: "Partial outage: GC may mark MC as unhealthy and stop assigning new meetings. Active sessions unaffected. Investigate MC-GC connectivity before it escalates."
          runbook_url: "docs/runbooks/mc-incident-response.md#scenario-6-gc-integration-failures"

      - alert: MCHighMemory
        expr: |
          (
            container_memory_usage_bytes{pod=~"mc-service-.*"}
            /
            container_spec_memory_limit_bytes{pod=~"mc-service-.*"}
          ) > 0.85
        for: 10m
        labels:
          severity: warning
          service: mc-service
          component: infrastructure
        annotations:
          summary: "MC memory usage high ({{ $value | humanizePercentage }})"
          description: "Meeting Controller pod {{ $labels.pod }} memory usage is {{ $value | humanizePercentage }} for 10 minutes."
          impact: "Risk of OOM kill. May need to investigate memory usage or increase limits."
          runbook_url: "docs/runbooks/mc-incident-response.md#scenario-7-resource-pressure"

      - alert: MCHighCPU
        expr: |
          rate(container_cpu_usage_seconds_total{pod=~"mc-service-.*"}[5m]) > 0.80
        for: 5m
        labels:
          severity: warning
          service: mc-service
          component: infrastructure
        annotations:
          summary: "MC CPU usage high ({{ $value | humanizePercentage }})"
          description: "Meeting Controller pod {{ $labels.pod }} CPU usage is {{ $value | humanizePercentage }} for 5 minutes."
          impact: "High CPU may increase message processing latency. Consider scaling horizontally."
          runbook_url: "docs/runbooks/mc-incident-response.md#scenario-7-resource-pressure"

      - alert: MCLowConnectionCount
        expr: |
          sum(mc_connections_active) < 1 and sum(mc_meetings_active) > 0
        for: 5m
        labels:
          severity: warning
          service: mc-service
          component: webtransport
        annotations:
          summary: "MC has active meetings but no connections"
          description: "Meeting Controller has {{ $value }} active meetings but no WebTransport connections for 5 minutes."
          impact: "Meetings may be orphaned. Investigate connection issues."
          runbook_url: "docs/runbooks/mc-incident-response.md#scenario-3-meeting-lifecycle-issues"

      - alert: MCGCHeartbeatWarning
        expr: |
          (
            sum(rate(mc_gc_heartbeats_total{status="error"}[5m]))
            /
            sum(rate(mc_gc_heartbeats_total[5m]))
          ) > 0.10
        for: 5m
        labels:
          severity: warning
          service: mc-service
          component: gc-integration
        annotations:
          summary: "MC-GC heartbeat failure rate elevated ({{ $value | humanizePercentage }})"
          description: "Meeting Controller heartbeat failures to Global Controller at {{ $value | humanizePercentage }} for 5 minutes."
          impact: "GC integration may be degraded. Investigate connectivity."
          runbook_url: "docs/runbooks/mc-incident-response.md#scenario-6-gc-integration-failures"

      - alert: MCPodRestartingFrequently
        expr: |
          rate(kube_pod_container_status_restarts_total{pod=~"mc-service-.*"}[1h]) > 0.016
        for: 5m
        labels:
          severity: warning
          service: mc-service
          component: infrastructure
        annotations:
          summary: "MC pod {{ $labels.pod }} restarting frequently"
          description: "Pod {{ $labels.pod }} has restarted {{ $value }} times per hour. This may indicate crashes, OOM kills, or liveness probe failures."
          impact: "Service instability. Investigate logs for crash causes."
          runbook_url: "docs/runbooks/mc-incident-response.md#scenario-4-complete-service-outage"

      - alert: MCCapacityWarning
        expr: |
          sum(mc_meetings_active) > 80
        for: 10m
        labels:
          severity: warning
          service: mc-service
          component: capacity
        annotations:
          summary: "MC approaching capacity ({{ $value }} active meetings)"
          description: "Meeting Controller has {{ $value }} active meetings, approaching capacity threshold."
          impact: "May need to scale out or reject new meetings soon."
          runbook_url: "docs/runbooks/mc-incident-response.md#scenario-7-resource-pressure"

      - alert: MCMediaConnectionAllFailed
        expr: |
          sum(increase(mc_media_connection_failures_total{all_failed="true"}[5m])) > 0
        for: 5m
        labels:
          severity: warning
          service: mc-service
          component: mh-coordination
        annotations:
          summary: "Clients reporting all MH connections failed"
          description: "One or more clients have reported that all Media Handler candidates failed. This means affected participants have no working media connection."
          impact: "Affected participants cannot send or receive media. Investigate MH health and network connectivity."
          runbook_url: "docs/runbooks/mc-incident-response.md#scenario-11-media-connection-failures"

      - alert: MCHighJoinFailureRate
        expr: |
          (
            sum(rate(mc_session_joins_total{status="failure"}[5m]))
            /
            sum(rate(mc_session_joins_total[5m]))
          ) > 0.05
          and
          sum(rate(mc_session_joins_total[5m])) > 0
        for: 5m
        labels:
          severity: warning
          service: mc-service
          component: meeting-join
        annotations:
          summary: "MC session join failure rate high ({{ $value | humanizePercentage }})"
          description: "Session join failure rate is {{ $value | humanizePercentage }} for 5 minutes. Check 'Join Failures by Error Type' dashboard panel to determine root cause."
          impact: "Some users unable to join meetings via WebTransport. Investigate join failure types in MC Overview dashboard."
          runbook_url: "docs/runbooks/mc-incident-response.md#scenario-8-join-failures"

      - alert: MCHighWebTransportRejections
        expr: |
          (
            sum(rate(mc_webtransport_connections_total{status="rejected"}[5m]))
            /
            sum(rate(mc_webtransport_connections_total[5m]))
          ) > 0.10
          and
          sum(rate(mc_webtransport_connections_total[5m])) > 0
        for: 5m
        labels:
          severity: warning
          service: mc-service
          component: meeting-join
        annotations:
          summary: "MC WebTransport rejection rate high ({{ $value | humanizePercentage }})"
          description: "WebTransport connection rejection rate is {{ $value | humanizePercentage }} for 5 minutes. May indicate capacity exhaustion or misconfigured clients."
          impact: "Users unable to establish WebTransport sessions. Check MC capacity and connection limits."
          runbook_url: "docs/runbooks/mc-incident-response.md#scenario-9-webtransport-rejections"

      - alert: MCHighJwtValidationFailures
        expr: |
          (
            sum(rate(mc_jwt_validations_total{result="failure"}[5m]))
            /
            sum(rate(mc_jwt_validations_total[5m]))
          ) > 0.10
          and
          sum(rate(mc_jwt_validations_total[5m])) > 0
        for: 5m
        labels:
          severity: warning
          service: mc-service
          component: meeting-join
        annotations:
          summary: "MC JWT validation failure rate high ({{ $value | humanizePercentage }})"
          description: "JWT validation failure rate is {{ $value | humanizePercentage }} for 5 minutes. May indicate expired tokens, JWKS rotation issues, or token tampering."
          impact: "Users unable to authenticate for meeting join. Check AC service health and JWKS endpoint availability."
          runbook_url: "docs/runbooks/mc-incident-response.md#scenario-10-jwt-validation-failures"

  - name: mc-service-info
    interval: 60s
    rules:
      # ====================================================================
      # INFO ALERTS - Log only, no notification
      # ====================================================================

      - alert: MCHighJoinLatency
        expr: |
          histogram_quantile(0.95,
            sum by(le) (rate(mc_session_join_duration_seconds_bucket{status="success"}[5m]))
          ) > 2.0
        for: 5m
        labels:
          severity: info
          service: mc-service
          component: meeting-join
        annotations:
          summary: "MC session join p95 latency high ({{ $value }}s > 2s)"
          description: "Session join p95 latency is {{ $value }}s, exceeding 2s threshold for 5 minutes. MC SLO is p99 <500ms, so p95 >2s is a leading indicator of degradation. Note: info severity because the aggregate MCHighLatency page alert covers the processing SLO; this tracks join-specific latency."
          impact: "Slow meeting join experience. Investigate JWT validation, actor processing, and WebTransport session setup latency."
          runbook_url: "docs/runbooks/mc-incident-response.md#scenario-5-high-latency"
