# Lenient-mode fixture: runbook_url present but empty. Must fail even under lenient.
groups:
  - name: fx-legacy
    rules:
      - alert: FxLenientEmptyRunbook
        expr: up == 0
        for: 1m
        labels:
          severity: critical
          service: fx-service
        annotations:
          summary: "Fx down"
          description: "Fx is down."
          impact: "User-visible."
          runbook_url: ""
