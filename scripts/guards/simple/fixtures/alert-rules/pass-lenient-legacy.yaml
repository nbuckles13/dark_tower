# Lenient-mode fixture: absolute URL + severity critical. Must pass under lenient mode.
groups:
  - name: fx-legacy
    rules:
      - alert: FxLegacyExample
        expr: up == 0
        for: 1m
        labels:
          severity: critical
          service: fx-service
        annotations:
          summary: "Fx down (legacy-labeled)"
          description: "Legacy rule pre-dating ADR-0031 severity taxonomy."
          impact: "Users affected."
          runbook_url: "https://github.com/yourorg/dark_tower/blob/main/docs/runbooks/gc-incident-response.md#scenario-4-complete-service-outage"
