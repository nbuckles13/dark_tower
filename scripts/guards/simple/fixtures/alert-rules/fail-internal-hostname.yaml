# Both-modes fixture: summary references internal DNS suffix. Must fail.
groups:
  - name: fx-page
    rules:
      - alert: FxInternalHostname
        expr: up == 0
        for: 1m
        labels:
          severity: page
          service: fx-service
        annotations:
          summary: "Fx prod-host-1234.svc.cluster.local down"
          description: "Fx is down."
          impact: "User-visible."
          runbook_url: "docs/runbooks/gc-incident-response.md#scenario-4-complete-service-outage"
