# Both-modes fixture: description contains a bearer token. Must fail.
groups:
  - name: fx-page
    rules:
      - alert: FxLeakedBearer
        expr: up == 0
        for: 1m
        labels:
          severity: page
          service: fx-service
        annotations:
          summary: "Fx down"
          description: "Token was Bearer abc123XYZ9876def. Fx is down."
          impact: "User-visible."
          runbook_url: "docs/runbooks/gc-incident-response.md#scenario-4-complete-service-outage"
