# Lenient-mode fixture: for: 10s. Must fail even under lenient mode.
groups:
  - name: fx-legacy
    rules:
      - alert: FxLenientShortFor
        expr: up == 0
        for: 10s
        labels:
          severity: critical
          service: fx-service
        annotations:
          summary: "Fx down"
          description: "Fx is down."
          impact: "User-visible."
          runbook_url: "https://example.com/runbooks/fx.md"
