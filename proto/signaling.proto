syntax = "proto3";

package dark_tower.signaling;

import "google/protobuf/timestamp.proto";

// Participant capabilities during join
message ParticipantCapabilities {
  repeated string video_codecs = 1;  // e.g., ["VP9", "AV1", "H264"]
  repeated string audio_codecs = 2;  // e.g., ["Opus", "AAC"]
  bool supports_simulcast = 3;
  uint32 max_video_streams = 4;
}

// Request to join a meeting (ADR-0023 Session Binding Token Pattern)
//
// First connection: correlation_id and binding_token are empty.
// Reconnection: Client provides previous correlation_id and binding_token
// for session recovery.
message JoinRequest {
  string meeting_id = 1;
  string join_token = 2;              // JWT from GC (always required, must be fresh)
  string participant_name = 3;
  ParticipantCapabilities capabilities = 4;
  // Session recovery fields (ADR-0023)
  string correlation_id = 5;          // UUIDv7, empty for first join
  string binding_token = 6;           // HMAC-SHA256 binding token, empty for first join
}

// Encryption keys for end-to-end encryption
message EncryptionKeys {
  bytes public_key = 1;
  string key_id = 2;
}

// Information about the media server
message MediaServerInfo {
  string media_handler_url = 1;
  reserved 2;  // was: connection_token (removed — client uses meeting JWT)
}

// Stream type enumeration
// TODO(post-story): rename to STREAM_TYPE_AUDIO/CAMERA/SCREEN per buf STANDARD ENUM_VALUE_PREFIX (wire-breaking; tracked in docs/TODO.md).
// buf:lint:ignore ENUM_VALUE_PREFIX
// buf:lint:ignore ENUM_ZERO_VALUE_SUFFIX
enum StreamType {
  AUDIO = 0;
  VIDEO_CAMERA = 1;
  VIDEO_SCREEN = 2;
}

// Simulcast layer configuration
message SimulcastLayer {
  string layer_id = 1;
  uint32 width = 2;
  uint32 height = 3;
  uint32 max_bitrate = 4;
}

// Video metadata
message VideoMetadata {
  uint32 width = 1;
  uint32 height = 2;
  uint32 framerate = 3;
  repeated SimulcastLayer simulcast_layers = 4;
}

// Stream metadata
message StreamMetadata {
  string codec = 1;
  uint32 max_bitrate = 2;
  VideoMetadata video = 3;  // Only for video streams
}

// Media stream information
message MediaStream {
  string stream_id = 1;
  StreamType stream_type = 2;
  StreamMetadata metadata = 3;
}

// Participant information
message Participant {
  string participant_id = 1;
  string name = 2;
  repeated MediaStream streams = 3;
  uint64 joined_at = 4;
}

// Response to join request (ADR-0023 Session Binding Token Pattern)
//
// For first join: MC generates new correlation_id and binding_token.
// For reconnection: MC issues new binding_token (nonce rotates on success).
// Client must store correlation_id and binding_token for reconnection.
message JoinResponse {
  string participant_id = 1;
  uint64 user_id = 2;  // 8-byte user ID for media frames
  repeated Participant existing_participants = 3;
  repeated MediaServerInfo media_servers = 4;  // Multiple handlers
  EncryptionKeys encryption_keys = 5;
  // Session recovery fields (ADR-0023)
  string correlation_id = 6;          // UUIDv7, client stores for reconnection
  string binding_token = 7;           // Client stores for reconnection (30s TTL)
}

// Reason for participant leaving
// TODO(post-story): rename to LEAVE_REASON_VOLUNTARY/KICKED/CONNECTION_LOST/MEETING_ENDED/TIMEOUT per buf STANDARD ENUM_VALUE_PREFIX (wire-breaking; tracked in docs/TODO.md).
// buf:lint:ignore ENUM_VALUE_PREFIX
// buf:lint:ignore ENUM_ZERO_VALUE_SUFFIX
enum LeaveReason {
  VOLUNTARY = 0;
  KICKED = 1;
  CONNECTION_LOST = 2;
  MEETING_ENDED = 3;
  TIMEOUT = 4;  // ADR-0023: 30s disconnect grace period expired
}

// ============================================================================
// ADR-0023: Mute State (Self-mute vs Host-mute)
// ============================================================================

// Request to update self-mute status (informational, not enforced by MH)
message MuteRequest {
  bool audio_muted = 1;
  bool video_muted = 2;
}

// Notification of participant mute state change
message ParticipantMuteUpdate {
  string participant_id = 1;
  bool audio_self_muted = 2;      // Informational: participant muted themselves
  bool video_self_muted = 3;      // Informational: participant muted themselves
  bool audio_host_muted = 4;      // Enforced: host muted participant
  bool video_host_muted = 5;      // Enforced: host muted participant
  string host_muted_by = 6;       // user_id of host who applied mute (if host-muted)
}

// Host request to mute a participant (enforced by MC + MH)
message HostMuteRequest {
  string participant_id = 1;
  bool audio_muted = 2;
  bool video_muted = 3;
  string reason = 4;              // Optional reason shown to participant
}

// Participant request to unmute after being host-muted
message UnmuteRequest {
  bool request_audio = 1;
  bool request_video = 2;
}

// Host response to unmute request
message UnmuteResponse {
  string participant_id = 1;
  bool audio_approved = 2;
  bool video_approved = 3;
}

// ============================================================================
// ADR-0023: MC Migration / Redirect
// ============================================================================

// Server notification to client to reconnect to a different MC
// Sent during graceful shutdown, load shedding, or rebalancing
message RedirectToMc {
  string new_mc_endpoint = 1;     // WebTransport endpoint of target MC
  string meeting_id = 2;
  string reason = 3;              // "migration", "rebalance", "capacity"
}

// Notification of participant joining
message ParticipantJoined {
  Participant participant = 1;
}

// Notification of participant leaving
message ParticipantLeft {
  string participant_id = 1;
  LeaveReason reason = 2;
}

// Request to publish a new stream
message PublishStream {
  string stream_id = 1;
  StreamType stream_type = 2;
  StreamMetadata metadata = 3;
}

// Notification of stream being published
message StreamPublished {
  string participant_id = 1;
  MediaStream stream = 2;
}

// ============================================================================
// Virtualized Pub/Sub - Layout-based Subscription
// ============================================================================

// Layout type enumeration
// TODO(post-story): rename to LAYOUT_TYPE_GRID per buf STANDARD ENUM_VALUE_PREFIX (wire-breaking; tracked in docs/TODO.md).
// buf:lint:ignore ENUM_VALUE_PREFIX
// buf:lint:ignore ENUM_ZERO_VALUE_SUFFIX
enum LayoutType {
  GRID = 0;
  // Future: STACK = 1, PRESENTATION = 2, etc.
}

// Media type for stream assignments
// TODO(post-story): rename to MEDIA_TYPE_AUDIO/VIDEO_CAMERA/VIDEO_SCREEN per buf STANDARD ENUM_VALUE_PREFIX (wire-breaking; tracked in docs/TODO.md).
// buf:lint:ignore ENUM_VALUE_PREFIX
// buf:lint:ignore ENUM_ZERO_VALUE_SUFFIX
enum MediaType {
  MEDIA_AUDIO = 0;
  MEDIA_VIDEO_CAMERA = 1;
  MEDIA_VIDEO_SCREEN = 2;
}

// Layout configuration
message LayoutConfig {
  // For Grid layout
  uint32 rows = 1;
  uint32 columns = 2;
  uint32 max_streams = 3;  // rows * columns

  // Customization
  repeated uint64 pinned_users = 4;   // Must appear in layout
  repeated uint64 excluded_users = 5;  // Must not appear
  bool prefer_video_over_audio = 6;
  bool include_self = 7;
}

// Request to subscribe to a layout (replaces individual stream subscription)
message SubscribeToLayout {
  LayoutType layout_type = 1;
  LayoutConfig config = 2;
  repeated uint32 stream_ids = 3;  // Subscriber-chosen IDs for each slot
}

// Stream assignment for a layout slot
message StreamAssignment {
  uint32 stream_id = 1;        // The subscriber's local stream_id
  uint64 user_id = 2;           // Source participant
  MediaType media_type = 3;     // camera, screen, audio
  uint32 slot_index = 4;        // Position in layout (0-based)
  string media_handler_url = 5; // Which handler to receive from
}

// Response with stream assignments for layout
message StreamAssignments {
  repeated StreamAssignment assignments = 1;
}

// Request to update current layout configuration
message UpdateLayout {
  LayoutConfig new_config = 1;  // New layout configuration
}

// Request to unsubscribe from current layout
message UnsubscribeLayout {
  // No parameters needed - unsubscribes from current layout
}

// Stream quality update (bidirectional)
message StreamQualityUpdate {
  string stream_id = 1;
  uint32 available_bitrate = 2;
  float packet_loss = 3;
  uint32 rtt_ms = 4;
}

// Error codes
// TODO(post-story): rename to ERROR_CODE_UNKNOWN/INVALID_REQUEST/... per buf STANDARD ENUM_VALUE_PREFIX (wire-breaking; tracked in docs/TODO.md).
// buf:lint:ignore ENUM_VALUE_PREFIX
// buf:lint:ignore ENUM_ZERO_VALUE_SUFFIX
enum ErrorCode {
  UNKNOWN = 0;
  INVALID_REQUEST = 1;
  UNAUTHORIZED = 2;
  FORBIDDEN = 3;
  NOT_FOUND = 4;
  CONFLICT = 5;
  INTERNAL_ERROR = 6;
  CAPACITY_EXCEEDED = 7;
  STREAM_ERROR = 8;
}

// Error message
message ErrorMessage {
  ErrorCode code = 1;
  string message = 2;
  map<string, string> details = 3;
}

// Per-MH connection-state classification reported by clients in
// MediaConnectionUpdate. Catalog-style enum-value prefix per ADR-0011
// + internal.proto convention (DisconnectReason, RejectionReason).
enum ConnectionState {
  CONNECTION_STATE_UNSPECIFIED  = 0;
  CONNECTION_STATE_CONNECTED    = 1;
  CONNECTION_STATE_FAILED       = 2;
  CONNECTION_STATE_DISCONNECTED = 3;
}

// Per-MH connection status reported by the client.
message MhConnectionStatus {
  // URL of the media handler this status pertains to.
  // SECURITY: client-controlled. Consumers MUST truncate before logging
  // (current MC handler bound: 256 bytes via floor_char_boundary).
  // SDK SHOULD cap at <= 256 bytes when populating.
  string mh_url = 1;

  ConnectionState state = 2;

  // Optional human-readable failure reason. Empty when state != FAILED.
  // SECURITY: client-controlled, untrusted. Same 256-byte truncation
  // discipline as `mh_url`; never log unbounded.
  optional string failure_reason = 3;

  // Optional structured failure code (SDK-defined enum-as-string,
  // e.g. "QUIC_TIMEOUT", "TLS_HANDSHAKE_FAIL"). Empty when state != FAILED.
  // SECURITY: client-controlled; same truncation discipline.
  optional string failure_code = 4;

  google.protobuf.Timestamp observed_at = 5;
}

// Client report of per-MH media connection state (replaces predecessor
// MediaConnectionFailed; richer per-handler shape supports the SDK's
// connectAll() resolver in browser-client-join story Task #14).
message MediaConnectionUpdate {
  repeated MhConnectionStatus statuses = 1;
}

// Client to server message wrapper
message ClientMessage {
  oneof message {
    JoinRequest join_request = 1;
    PublishStream publish_stream = 2;
    SubscribeToLayout subscribe_to_layout = 3;
    UpdateLayout update_layout = 4;
    UnsubscribeLayout unsubscribe_layout = 5;
    StreamQualityUpdate stream_quality_update = 6;
    // ADR-0023: Mute messages
    MuteRequest mute_request = 7;
    HostMuteRequest host_mute_request = 8;
    UnmuteRequest unmute_request = 9;
    UnmuteResponse unmute_response = 10;
    // browser-client-join R-60: replaces MediaConnectionFailed; tag 11
    // reused (one-time wire break — no on-wire clients exist outside
    // this codebase per Clarification Question 9).
    MediaConnectionUpdate media_connection_update = 11;
  }

  // W3C Trace Context traceparent header value (RFC: ~55 chars,
  // e.g. "00-<trace-id>-<span-id>-<flags>"). Empty if client did not
  // propagate a trace. Parser is `TraceContextPropagator`; downstream
  // extraction tasks (R-57 MC, R-58-MH, SDK) own validation and rejection
  // of malformed values — do not rely on the proto layer for validation.
  string trace_parent = 20;

  // W3C Trace Context tracestate header value (vendor-specific kv pairs;
  // spec allows up to ~512 bytes / 32 entries). Same parser + validation
  // boundary as `trace_parent`.
  string trace_state = 21;
}

// MH client→server connect envelope; first framed message on a new bidi stream.
message MhConnectRequest {
  string join_token = 1;  // Meeting JWT; same semantics as JoinRequest.join_token.
}

// Wrapper envelope for client→MH messages (parallel to ClientMessage for MC).
message MhClientMessage {
  oneof message {
    MhConnectRequest connect_request = 1;
  }

  // W3C Trace Context (see ClientMessage::trace_parent for format,
  // parser, and validation boundary). Same envelope-level placement
  // pattern — available across all current and future MhClientMessage
  // variants without per-variant changes.
  string trace_parent = 20;
  string trace_state = 21;
}

// Server to client message wrapper
message ServerMessage {
  oneof message {
    JoinResponse join_response = 1;
    ParticipantJoined participant_joined = 2;
    ParticipantLeft participant_left = 3;
    StreamPublished stream_published = 4;
    StreamAssignments stream_assignments = 5;
    StreamQualityUpdate stream_quality_update = 6;
    ErrorMessage error = 7;
    // ADR-0023: Additional server messages
    ParticipantMuteUpdate participant_mute_update = 8;
    UnmuteRequest unmute_request = 9;    // Host receives participant's request
    UnmuteResponse unmute_response = 10; // Participant receives host's response
    RedirectToMc redirect_to_mc = 11;    // MC migration redirect
  }

  // W3C Trace Context (see ClientMessage::trace_parent for format,
  // parser, and validation boundary). MC populates these on outbound
  // ServerMessage via the global propagator (R-57) so client-side
  // observability sees a continuous trace across the bidi stream.
  string trace_parent = 20;
  string trace_state = 21;
}
